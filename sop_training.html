<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HK Hotel — SOP Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#2c2c2a;min-height:100vh}
:root{--blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#B5D4F4;--green:#27500A;--green-light:#EAF3DE;--amber:#633806;--amber-light:#FAEEDA;--red:#791F1F;--red-light:#FCEBEB;--gray:#888780;--border:#d3d1c7;--white:#ffffff;--surface:#f5f5f3}

/* ===== SCREENS ===== */
.screen{display:none;min-height:100vh;padding-bottom:70px}
.screen.active{display:block}

/* ===== LOGIN ===== */
#screen-login{background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;padding-bottom:2rem}
#screen-login.active{display:flex}
.login-logo{width:72px;height:72px;background:rgba(255,255,255,.15);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.login-logo span{font-size:32px;font-weight:700;color:#fff}
.login-title{font-size:22px;font-weight:600;color:#fff;margin-bottom:4px}
.login-sub{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:32px}
.login-card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:360px}
.login-card label{font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.login-card input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:#2c2c2a;background:#fafafa;margin-bottom:16px;outline:none}
.login-card input:focus{border-color:var(--blue);background:#fff}
.btn-login{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-login:active{opacity:.85}
.login-err{color:#e24b4a;font-size:13px;text-align:center;margin-top:10px;min-height:18px}

/* ===== HEADER ===== */
.header{background:var(--blue);padding:14px 16px 12px;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.header-title{font-size:16px;font-weight:600;color:#fff}
.header-sub{font-size:12px;color:rgba(255,255,255,.7)}
.header-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer}

/* ===== BOTTOM NAV ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:62px;background:#fff;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;max-width:600px;margin:0 auto}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;border:none;background:transparent;cursor:pointer;color:var(--gray);font-size:10px}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ===== NOTIF BANNER ===== */
.notif-banner{margin:12px 16px 0;border-radius:10px;padding:10px 12px;font-size:13px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.notif-warn{background:var(--amber-light);color:var(--amber)}
.notif-success{background:var(--green-light);color:var(--green)}
.notif-danger{background:var(--red-light);color:var(--red)}

/* ===== PROGRESS STATS ===== */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px}
.stat-box{background:#fff;border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:20px;font-weight:700;color:var(--blue)}
.stat-lbl{font-size:10px;color:var(--gray);margin-top:2px}

/* ===== SOP LIST ===== */
.section-title{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;padding:12px 16px 6px}
.sop-card{background:#fff;margin:0 16px 10px;border-radius:12px;padding:14px;border:1px solid var(--border);cursor:pointer;active:opacity:.8}
.sop-card:active{opacity:.85}
.sop-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.sop-code{font-size:11px;font-weight:700;color:var(--blue)}
.sop-name{font-size:15px;font-weight:600;color:#2c2c2a;margin:2px 0 4px}
.sop-meta{font-size:12px;color:var(--gray);margin-bottom:8px}
.prog-bar{height:4px;background:var(--blue-light);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--blue);transition:width .3s}
.badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-done{background:var(--green-light);color:var(--green)}
.badge-prog{background:var(--amber-light);color:var(--amber)}
.badge-new{background:var(--blue-light);color:var(--blue)}

/* ===== CARD VIEWER ===== */
#screen-cards .header{position:fixed;top:0;left:0;right:0;z-index:10}
.cards-wrap{padding-top:72px;padding-bottom:90px}
.toc-list{padding:8px 16px}
.toc-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0eeea;cursor:pointer}
.toc-item:last-child{border-bottom:none}
.toc-num{width:28px;height:28px;border-radius:50%;background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toc-num.done{background:var(--green-light);color:var(--green)}
.toc-num.current{background:var(--blue);color:#fff}
.toc-info{flex:1}
.toc-name{font-size:14px;color:#2c2c2a;font-weight:500}
.toc-type{font-size:11px;color:var(--gray);margin-top:1px}
.start-btn{display:block;margin:16px;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;text-align:center;cursor:pointer;width:calc(100% - 32px)}

/* Card slide */
.card-slide{background:#fff;margin:12px 16px;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.card-media{height:160px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-media img{width:100%;height:100%;object-fit:cover}
.card-media iframe{width:100%;height:100%;border:none}
.card-media-icon{font-size:64px;opacity:.4}
.card-content{padding:14px}
.card-step-label{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card-title{font-size:17px;font-weight:700;color:#2c2c2a;margin-bottom:8px}
.card-text{font-size:14px;color:#444441;line-height:1.7}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:var(--blue-light);color:var(--blue);font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid var(--blue-mid)}

/* Checklist card */
.checklist-wrap{padding:4px 0}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0eeea;cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.check-box.checked{background:var(--blue);border-color:var(--blue)}
.check-box.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.check-label{font-size:14px;color:#2c2c2a;flex:1}
.check-label.checked{text-decoration:line-through;color:var(--gray)}

/* Table card */
.table-wrap{overflow-x:auto;margin-top:8px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:var(--blue-light);color:var(--blue);padding:8px 10px;text-align:left;font-weight:700;white-space:nowrap}
.data-table td{padding:8px 10px;border-bottom:1px solid #f0eeea;color:#444441}
.data-table tr:last-child td{border-bottom:none}

/* Progress dots */
.dots-row{display:flex;justify-content:center;gap:4px;padding:8px 0 4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s}
.dot.active{background:var(--blue);width:20px;border-radius:3px}
.dot.done{background:var(--blue);opacity:.4}

/* Card nav */
.card-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:10}
.btn-prev{flex:1;padding:13px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:15px;font-weight:600;color:#2c2c2a;cursor:pointer}
.btn-next{flex:2;padding:13px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-finish{flex:2;padding:13px;border:none;border-radius:10px;background:#27500A;color:#fff;font-size:15px;font-weight:600;cursor:pointer}

/* ===== QUIZ ===== */
.quiz-wrap{padding:12px 16px;padding-top:80px;padding-bottom:20px}
.quiz-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.quiz-label{font-size:13px;color:var(--gray)}
.quiz-timer{font-size:13px;font-weight:700;color:var(--amber)}
.quiz-q覆{font-size:16px;font-weight:600;color:#2c2c2a;margin:14px 0;line-height:1.6}
.quiz-opt{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:10px;cursor:pointer;font-size:14px;color:#2c2c2a;line-height:1.5;transition:all .15s}
.quiz-opt:active{opacity:.8}
.quiz-opt.correct{background:var(--green-light);border-color:#97C459;color:var(--green)}
.quiz-opt.wrong{background:var(--red-light);border-color:#F09595;color:var(--red)}
.opt-lbl{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.correct .opt-lbl{background:#97C459;border-color:#97C459;color:#fff}
.wrong .opt-lbl{background:#F09595;border-color:#F09595;color:#fff}
.quiz-feedback{padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.6;margin-top:4px;display:none}
.fb-correct{background:var(--green-light);color:var(--green)}
.fb-wrong{background:var(--red-light);color:var(--red)}
.quiz-result{text-align:center;padding:30px 20px}
.result-score{font-size:64px;font-weight:800;color:var(--blue)}
.result-label{font-size:16px;color:var(--gray);margin-bottom:20px}
.result-msg{font-size:15px;font-weight:600;margin-bottom:24px}
.btn-retry{padding:13px 28px;border:1.5px solid var(--blue);border-radius:10px;background:#fff;color:var(--blue);font-size:15px;font-weight:600;cursor:pointer;margin-right:10px}
.btn-home{padding:13px 28px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer}

/* ===== LEADERBOARD ===== */
.ldb-header{background:var(--blue);padding:16px;text-align:center;color:#fff}
.ldb-month{font-size:18px;font-weight:700}
.ldb-reset{font-size:12px;opacity:.8;margin-top:2px}
.prize-box{margin:12px 16px;background:var(--amber-light);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px}
.prize-icon{font-size:28px}
.prize-label{font-size:11px;color:var(--amber);font-weight:600}
.prize-text{font-size:15px;font-weight:700;color:#412402}
.rank-list{padding:0 16px}
.rank-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #f0eeea}
.rank-item:last-child{border-bottom:none}
.rank-pos{width:28px;text-align:center;font-size:16px;font-weight:800}
.rank-pos.g{color:#BA7517}
.rank-pos.s{color:#888780}
.rank-pos.b{color:#854F0B}
.rank-avatar{width:36px;height:36px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--blue);flex-shrink:0}
.rank-name{flex:1;font-size:14px;font-weight:600;color:#2c2c2a}
.rank-sub{font-size:11px;color:var(--gray)}
.rank-score{font-size:16px;font-weight:800;color:var(--blue)}
.my-rank{background:var(--blue-light);border-radius:12px;margin:12px 16px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.my-rank-label{font-size:13px;color:var(--blue);font-weight:600}
.my-rank-score{font-size:20px;font-weight:800;color:var(--blue)}

/* ===== AI CHAT ===== */
.chat-wrap{padding:80px 16px 80px}
.chat-suggest{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.suggest-chip{background:#fff;border:1.5px solid var(--blue-mid);color:var(--blue);padding:7px 12px;border-radius:99px;font-size:13px;cursor:pointer}
.suggest-chip:active{background:var(--blue-light)}
.chat-msg{margin-bottom:10px}
.bubble-ai{background:#fff;border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:10px 14px;font-size:14px;color:#2c2c2a;max-width:85%;line-height:1.6}
.bubble-user{background:var(--blue);color:#fff;border-radius:14px 4px 14px 14px;padding:10px 14px;font-size:14px;max-width:85%;margin-left:auto;line-height:1.6}
.chat-input-bar{position:fixed;bottom:62px;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;z-index:10}
.chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:99px;font-size:14px;color:#2c2c2a;outline:none;background:#fafafa}
.chat-input:focus{border-color:var(--blue)}
.chat-send{width:42px;height:42px;background:var(--blue);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-send svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.typing{color:var(--gray);font-style:italic;font-size:13px}

/* ===== LOADING ===== */
.loading{text-align:center;padding:40px;color:var(--gray);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--blue-light);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== TOAST ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2c2c2a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="screen active" id="screen-login">
  <div class="login-logo"><span>HK</span></div>
  <div class="login-title">HK Hotel Training</div>
  <div class="login-sub">Hệ thống đào tạo SOP nội bộ</div>
  <div class="login-card">
    <label>Mã nhân viên</label>
    <input type="text" id="inp-manv" placeholder="VD: NV001" autocomplete="off" style="text-transform:uppercase">
    <label>Mật khẩu</label>
    <input type="password" id="inp-pw" placeholder="Nhập mật khẩu">
    <button class="btn-login" onclick="doLogin()">Đăng nhập</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div class="screen" id="screen-home">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">HK Hotel Training</div>
        <div class="header-sub" id="home-sub">Xin chào!</div>
      </div>
      <div class="header-avatar" id="home-avatar" onclick="doLogout()">HK</div>
    </div>
  </div>
  <div id="notif-area"></div>
  <div class="stats-row" id="stats-row">
    <div class="stat-box"><div class="stat-num" id="s1">—</div><div class="stat-lbl">SOP xong</div></div>
    <div class="stat-box"><div class="stat-num" id="s2">—</div><div class="stat-lbl">Tổng SOP</div></div>
    <div class="stat-box"><div class="stat-num" id="s3">—</div><div class="stat-lbl">Phút học</div></div>
  </div>
  <div class="section-title">Bài học tháng này</div>
  <div id="sop-list"><div class="loading"><div class="spinner"></div>Đang tải...</div></div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Bài học
    </button>
    <button class="nav-btn" onclick="showScreen('leaderboard')">
      <svg viewBox="0 0 24 24"><polyline points="18 20 18 10"/><polyline points="12 20 12 4"/><polyline points="6 20 6 14"/></svg>
      BXH
    </button>
    <button class="nav-btn" onclick="showScreen('ai')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Trợ lý
    </button>
    </div>
</div>

<div class="screen" id="screen-cards">
  <div class="header" style="position:fixed;top:0;left:0;right:0">
    <div class="header-top">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="backToHome()" style="background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:6px 10px;color:#fff;cursor:pointer;font-size:13px">← Quay lại</button>
        <div>
          <div class="header-title" id="card-sop-title">SOP</div>
          <div class="header-sub" id="card-sop-progress">Thẻ 1/1</div>
        </div>
      </div>
    </div>
  </div>
  <div class="cards-wrap" id="cards-wrap">
    <div class="loading"><div class="spinner"></div>Đang tải nội dung...</div>
  </div>
  <div class="dots-row" id="dots-row"></div>
  <div class="card-nav" id="card-nav" style="display:none">
    <button class="btn-prev" id="btn-prev" onclick="prevCard()">← Trước</button>
    <button class="btn-next" id="btn-next" onclick="nextCard()">Tiếp theo →</button>
  </div>
</div>

<div class="screen" id="screen-quiz">
  <div class="header" style="position:fixed;top:0;left:0;right:0">
    <div class="header-top">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="backToHome()" style="background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:6px 10px;color:#fff;cursor:pointer;font-size:13px">← Thoát</button>
        <div class="header-title" id="quiz-sop-title">Trắc nghiệm</div>
      </div>
    </div>
  </div>
  <div class="quiz-wrap" id="quiz-wrap">
    <div class="loading"><div class="spinner"></div>Gemini đang tạo câu hỏi...</div>
  </div>
</div>

<div class="screen" id="screen-leaderboard">
  <div class="ldb-header">
    <div class="ldb-month" id="ldb-month">Tháng —</div>
    <div class="ldb-reset" id="ldb-reset">Đang tải...</div>
  </div>
  <div class="prize-box" id="prize-box" style="display:none">
    <div class="prize-icon">🎁</div>
    <div><div class="prize-label">Giải thưởng tháng này</div><div class="prize-text" id="prize-text"></div></div>
  </div>
  <div class="my-rank">
    <div class="my-rank-label">Điểm của tôi tháng này</div>
    <div class="my-rank-score" id="my-score">—</div>
  </div>
  <div class="rank-list" id="rank-list"><div class="loading"><div class="spinner"></div>Đang tải...</div></div>
  <div class="bottom-nav">
    <button class="nav-btn" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
